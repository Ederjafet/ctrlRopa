spring.application.name=control-ropa
server.port=${CONTROL_ROPA_SERVER_PORT:8090}

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.url=${CONTROL_ROPA_DB_URL:jdbc:mysql://localhost:3306/control_ropa?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true}
spring.datasource.username=${CONTROL_ROPA_DB_USERNAME:root}
spring.datasource.password=${CONTROL_ROPA_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true

# ===============================
# SECURITY AUDIT RETENTION
# ===============================
security.audit.retention-days=${SECURITY_AUDIT_RETENTION_DAYS:180}
security.audit.cleanup.enabled=${SECURITY_AUDIT_CLEANUP_ENABLED:true}
security.audit.cleanup-cron=${SECURITY_AUDIT_CLEANUP_CRON:0 0 3 * * *}

# ===============================
# LOGGING
# ===============================
logging.file.name=${CONTROL_ROPA_LOG_FILE:C:/HPSQ-SOFT/control-ropa/logs/backend/control-ropa.log}
logging.logback.rollingpolicy.file-name-pattern=${CONTROL_ROPA_LOG_PATTERN:C:/HPSQ-SOFT/control-ropa/logs/backend/control-ropa.%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${CONTROL_ROPA_LOG_MAX_FILE_SIZE:20MB}
logging.logback.rollingpolicy.max-history=${CONTROL_ROPA_LOG_MAX_HISTORY:30}
logging.logback.rollingpolicy.total-size-cap=${CONTROL_ROPA_LOG_TOTAL_SIZE_CAP:1GB}
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.hpsqsoft.ctrlropa=INFO
