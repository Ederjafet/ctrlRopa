spring.application.name=control-ropa
server.port=8090

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/control_ropa?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Orion123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true

# ===============================
# LOGGING
# ===============================
logging.file.name=C:/HPSQ-SOFT/control-ropa/logs/backend/control-ropa.log
logging.logback.rollingpolicy.file-name-pattern=C:/HPSQ-SOFT/control-ropa/logs/backend/control-ropa.%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.hpsqsoft.ctrlropa=INFO
